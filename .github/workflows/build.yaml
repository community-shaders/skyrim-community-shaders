name: build Community Shaders and addons

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  compile:
    name: build plugin and addons
    runs-on: windows-latest
    steps:
        - uses: actions/checkout@v3
          with:
            submodules: recursive

        - uses: ilammy/msvc-dev-cmd@v1.10.0

        - uses: lukka/run-vcpkg@v11.5
          with:
            vcpkgJsonGlob: vcpkg.json

        - name: Build using run-cmake with ALL preset
          uses: lukka/run-cmake@v10
          with:
            configurePreset: ALL
            buildPreset: ALL
            buildPresetAdditionalArgs: "['--config', 'Release']"

        - name: create a tagged release and upload the archive
          uses: ncipollo/release-action@v1
          env:
              GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          with:
            name: Community Shaders ${{ github.ref_name }}
            draft: true
            tag: ${{ github.ref_name }}
            artifacts: "${{ github.workspace }}/dist/*.7z"

name: Reusable Shader Unit Tests

on:
    workflow_call:
        inputs:
            skip-tests:
                description: "Skip running the tests (for conditional execution)"
                type: boolean
                required: false
                default: false
            ref:
                description: "Git ref to checkout"
                type: string
                required: false
                default: ""
            repository:
                description: "Repository to checkout"
                type: string
                required: false
                default: ""

jobs:
    shader-unit-tests:
        name: Run Shader Unit Tests
        runs-on: windows-2022
        if: ${{ !inputs.skip-tests }}

        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  ref: ${{ inputs.ref || github.ref }}
                  repository: ${{ inputs.repository || github.repository }}
                  submodules: recursive

            - name: Setup MSVC environment
              uses: ilammy/msvc-dev-cmd@v1
              with:
                  arch: x64

            - name: Verify Graphics Tools (for D3D12 debug layer)
              shell: pwsh
              run: |
                  # Use environment variable for Windows directory (works on any drive)
                  $windowsDir = if ($env:SystemRoot) { $env:SystemRoot } else { "C:\Windows" }
                  $dll = "$windowsDir\System32\d3d12SDKLayers.dll"
                  if (Test-Path $dll) {
                      Write-Host "✅ Graphics Tools detected: $dll"
                  } else {
                      Write-Host "❌ Graphics Tools NOT found. Tests may fail."
                      Write-Host "Note: GitHub windows-2022 runners should have Graphics Tools pre-installed."
                      exit 1
                  }

            - name: Setup vcpkg
              uses: lukka/run-vcpkg@v11.5
              with:
                  vcpkgJsonGlob: vcpkg.json

            - name: Cache CMake build output
              uses: actions/cache@v4
              with:
                  path: build/ALL
                  key: ${{ runner.os }}-shader-tests-${{ hashFiles('.gitmodules', 'extern/**', 'CMakePresets.json', 'vcpkg.json', 'tests/shaders/**') }}
                  restore-keys: |
                      ${{ runner.os }}-shader-tests-
                      ${{ runner.os }}-cmake-

            - name: Remove stale CMake cache if drive letter changed
              shell: pwsh
              run: |
                  $cacheFile = "build/ALL/CMakeCache.txt"
                  if (Test-Path $cacheFile) {
                    $expected = (Resolve-Path .).Path.Substring(0,1)
                    $content = Get-Content $cacheFile -Raw
                    if ($content -match 'CMAKE_HOME_DIRECTORY:INTERNAL=([A-Z]):') {
                      $actual = $Matches[1]
                      if ($actual -ne $expected) {
                        Write-Host "❌ Cache drive mismatch. Removing stale build/ALL directory."
                        Remove-Item -Recurse -Force "build/ALL"
                      } else {
                        Write-Host "✅ Cache path matches. Keeping build/ALL."
                      }
                    }
                  }

            - name: Configure CMake with shader tests
              run: |
                  cmake --preset ALL -DBUILD_SHADER_TESTS=ON

            - name: Build shader tests
              run: |
                  cmake --build build/ALL --target shader_tests --config Release

            - name: Run shader unit tests
              run: |
                  ctest --test-dir build/ALL -C Release --output-on-failure -R ShaderTests

            - name: Upload test results on failure
              if: failure()
              uses: actions/upload-artifact@v4
              with:
                  name: shader-test-results
                  path: |
                      build/ALL/Testing/**
                  retention-days: 7
                  if-no-files-found: ignore
